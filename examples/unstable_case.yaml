        delta_s: [0.1, 0.2]
        delta_i: [0.2, 0.3]
        cone: local
        preconditions: []
        postconditions: ["overload"]
      - id: U2
        type: UnknownType
        delta_e: [0.0, 0.1]
        delta_s: [0.2, 0.4]
        delta_i: [0.0, 0.1]
        cone: global
        preconditions: ["U1"]
        postconditions: ["broken_state"]
    edges:
      - source: U1
        target: U2
        lag: [0.0, 0.1]
